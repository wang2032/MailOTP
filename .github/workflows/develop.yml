name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: mailotp

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.HARBOR_HOST }}/${{ secrets.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.HARBOR_HOST }}/${{ secrets.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    env:
      HARBOR_HOST: ${{ secrets.HARBOR_HOST }}
      HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          envs: HARBOR_HOST,HARBOR_PROJECT,HARBOR_USERNAME,HARBOR_PASSWORD
          script: |
            set -e
            mkdir -p /opt/mailotp
            IMAGE_REF=${HARBOR_HOST}/${HARBOR_PROJECT}/mailotp:latest

            if [ ! -f /opt/mailotp/.env ]; then
              {
                echo "DOCKER_IMAGE=${IMAGE_REF}"
                echo "DATABASE_URL="
                echo "REDIS_URL="
                echo "WEBHOOK_SECRET="
                echo "MAIL_DOMAIN=joeystory.xyz"
                echo "CORS_ORIGINS=http://joeystory.xyz,http://117.72.157.82:18080"
              } > /opt/mailotp/.env
              chmod 600 /opt/mailotp/.env
            else
              if grep -q '^DOCKER_IMAGE=' /opt/mailotp/.env; then
                sed -i "s#^DOCKER_IMAGE=.*#DOCKER_IMAGE=${IMAGE_REF}#" /opt/mailotp/.env
              else
                printf '\nDOCKER_IMAGE=%s\n' "${IMAGE_REF}" >> /opt/mailotp/.env
              fi
            fi

            cat > /opt/mailotp/docker-compose.yml <<'EOF'
            services:
              mailotp:
                image: ${DOCKER_IMAGE}
                restart: unless-stopped
                ports:
                  - "18080:8080"
                environment:
                  DATABASE_URL: "${DATABASE_URL}"
                  REDIS_URL: "${REDIS_URL}"
                  WEBHOOK_SECRET: "${WEBHOOK_SECRET}"
                  MAIL_DOMAIN: "${MAIL_DOMAIN}"
                  HTTP_ADDR: ":8080"
                  STATIC_DIR: "/app/web"
                  AUTO_CREATE_TABLES: "true"
                  CORS_ORIGINS: "${CORS_ORIGINS}"
                extra_hosts:
                  - "host.docker.internal:host-gateway"
            EOF

            cd /opt/mailotp
            echo "${HARBOR_PASSWORD}" | docker login "${HARBOR_HOST}" -u "${HARBOR_USERNAME}" --password-stdin
            docker compose --env-file .env pull
            docker compose --env-file .env up -d
            docker image prune -f
