name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: mailotp

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build deploy image archive
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          outputs: type=docker,dest=/tmp/mailotp-image.tar
          cache-from: type=gha

      - name: Upload deploy image archive
        uses: actions/upload-artifact@v4
        with:
          name: mailotp-image
          path: /tmp/mailotp-image.tar
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Download deploy image archive
        uses: actions/download-artifact@v4
        with:
          name: mailotp-image
          path: deploy-image

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: mkdir -p /opt/mailotp

      - name: Upload image archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          source: deploy-image/mailotp-image.tar
          target: /opt/mailotp
          strip_components: 1

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          envs: DOCKERHUB_USERNAME
          script: |
            set -e
            mkdir -p /opt/mailotp

            if [ ! -f /opt/mailotp/.env ]; then
              cat > /opt/mailotp/.env <<EOF
            DOCKER_IMAGE=${DOCKERHUB_USERNAME}/mailotp:latest
            DATABASE_URL=
            REDIS_URL=
            WEBHOOK_SECRET=
            MAIL_DOMAIN=joeystory.xyz
            CORS_ORIGINS=http://joeystory.xyz,http://117.72.157.82:18080
            EOF
              chmod 600 /opt/mailotp/.env
            fi

            cat > /opt/mailotp/docker-compose.yml <<'EOF'
            services:
              mailotp:
                image: ${DOCKER_IMAGE}
                restart: unless-stopped
                ports:
                  - "18080:8080"
                environment:
                  DATABASE_URL: "${DATABASE_URL}"
                  REDIS_URL: "${REDIS_URL}"
                  WEBHOOK_SECRET: "${WEBHOOK_SECRET}"
                  MAIL_DOMAIN: "${MAIL_DOMAIN}"
                  HTTP_ADDR: ":8080"
                  STATIC_DIR: "/app/web"
                  AUTO_CREATE_TABLES: "true"
                  CORS_ORIGINS: "${CORS_ORIGINS}"
                extra_hosts:
                  - "host.docker.internal:host-gateway"
            EOF

            cd /opt/mailotp
            docker load -i /opt/mailotp/mailotp-image.tar
            docker compose --env-file .env up -d
            docker image prune -f
