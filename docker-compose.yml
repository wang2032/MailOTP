services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mailotp
      POSTGRES_USER: mailotp
      POSTGRES_PASSWORD: mailotp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailotp -d mailotp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
